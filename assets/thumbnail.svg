<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" width="1280" height="720" role="img" aria-label="L'Éveil de la Fournaise - miniature hero">
  <title>L'Éveil de la Fournaise — Sauve La Réunion vague par vague</title>
  <desc>Miniature cinématique : Piton de la Fournaise en éruption, Saint-Denis en lampions, zombies cartoon, héros tirant, hibiscus et palmiers.</desc>

  <defs>
    <!-- Ciel volcanique -->
    <linearGradient id="skyGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2d1a0d"/>
      <stop offset="25%" stop-color="#7a2a14"/>
      <stop offset="55%" stop-color="#e94e1b"/>
      <stop offset="85%" stop-color="#ff6b35"/>
      <stop offset="100%" stop-color="#ffb069"/>
    </linearGradient>

    <!-- Halo volcan -->
    <radialGradient id="volcanoHalo" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ffe6a0" stop-opacity="0.85"/>
      <stop offset="40%" stop-color="#ff6b35" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#ff6b35" stop-opacity="0"/>
    </radialGradient>

    <!-- Lave -->
    <linearGradient id="lavaGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fff3a0"/>
      <stop offset="35%" stop-color="#ff6b35"/>
      <stop offset="100%" stop-color="#e94e1b"/>
    </linearGradient>

    <!-- Sol nuit -->
    <linearGradient id="groundGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#3a2412"/>
      <stop offset="100%" stop-color="#1a0d05"/>
    </linearGradient>

    <!-- Cases créoles silhouette -->
    <linearGradient id="houseGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a0d05"/>
      <stop offset="100%" stop-color="#000000"/>
    </linearGradient>

    <!-- Zombie -->
    <linearGradient id="zombieGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#3fb55f"/>
      <stop offset="100%" stop-color="#1c8b3e"/>
    </linearGradient>

    <!-- Or titres -->
    <linearGradient id="goldGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffe6a0"/>
      <stop offset="50%" stop-color="#f4b942"/>
      <stop offset="100%" stop-color="#a8731a"/>
    </linearGradient>

    <!-- Orange titre -->
    <linearGradient id="titleFire" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffe6a0"/>
      <stop offset="30%" stop-color="#ff6b35"/>
      <stop offset="100%" stop-color="#e94e1b"/>
    </linearGradient>

    <filter id="softGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <filter id="bigGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="12" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <filter id="dropShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="4"/>
      <feOffset dx="2" dy="4" result="offsetblur"/>
      <feFlood flood-color="#000" flood-opacity="0.6"/>
      <feComposite in2="offsetblur" operator="in"/>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Ciel -->
  <rect x="0" y="0" width="1280" height="720" fill="url(#skyGrad)"/>

  <!-- Étoiles/cendres -->
  <g fill="#ffe6a0" opacity="0.6">
    <circle cx="120" cy="60" r="2"/>
    <circle cx="220" cy="100" r="1.5"/>
    <circle cx="380" cy="50" r="2.2"/>
    <circle cx="500" cy="80" r="1.4"/>
    <circle cx="780" cy="40" r="1.7"/>
    <circle cx="900" cy="90" r="2"/>
    <circle cx="1050" cy="60" r="1.5"/>
    <circle cx="1180" cy="110" r="2"/>
    <circle cx="60" cy="180" r="1.4"/>
    <circle cx="1220" cy="200" r="1.8"/>
  </g>

  <!-- Cendres volantes orange (particules ambiance) -->
  <g fill="#ff6b35" opacity="0.7">
    <circle cx="320" cy="170" r="2.5"/>
    <circle cx="450" cy="220" r="2"/>
    <circle cx="680" cy="180" r="2.6"/>
    <circle cx="820" cy="230" r="1.8"/>
    <circle cx="960" cy="170" r="2.3"/>
    <circle cx="1100" cy="240" r="2"/>
    <circle cx="200" cy="260" r="2.2"/>
    <circle cx="540" cy="290" r="1.8"/>
  </g>

  <!-- Halo géant autour du volcan -->
  <circle cx="900" cy="380" r="380" fill="url(#volcanoHalo)"/>

  <!-- Pitons en arrière-plan (silhouettes lointaines) -->
  <g fill="#3a1f12" opacity="0.85">
    <polygon points="0,520 180,300 360,520"/>
    <polygon points="280,520 480,320 680,520"/>
  </g>

  <!-- Piton de la Fournaise en éruption (gros, à droite) -->
  <g filter="url(#softGlow)">
    <!-- Cône principal -->
    <polygon points="700,520 900,200 1100,520" fill="#2a1408" stroke="#0a0402" stroke-width="3"/>
    <!-- Cratère -->
    <ellipse cx="900" cy="210" rx="55" ry="15" fill="#0a0402"/>

    <!-- Jets de lave -->
    <path d="M 900 200 Q 870 110 855 50 Q 880 80 890 160 Z" fill="#ff6b35"/>
    <path d="M 900 200 Q 905 100 920 30 Q 925 90 915 170 Z" fill="#ffe6a0"/>
    <path d="M 900 200 Q 935 120 960 70 Q 940 130 928 175 Z" fill="#e94e1b"/>

    <!-- Particules de lave en vol -->
    <circle cx="868" cy="100" r="9" fill="#ffe6a0"/>
    <circle cx="932" cy="80" r="7" fill="#ff6b35"/>
    <circle cx="848" cy="150" r="6" fill="#ffe6a0"/>
    <circle cx="950" cy="130" r="8" fill="#e94e1b"/>
    <circle cx="970" cy="180" r="5" fill="#ff6b35"/>
    <circle cx="820" cy="180" r="4" fill="#ffe6a0"/>

    <!-- Coulée de lave côté droit (en bas du volcan) -->
    <path d="M 980 410 Q 1020 470 1080 520 L 1060 520 Q 1010 480 970 430 Z" fill="url(#lavaGrad)"/>
    <!-- Coulée côté gauche -->
    <path d="M 820 410 Q 780 470 720 520 L 740 520 Q 790 480 830 430 Z" fill="url(#lavaGrad)" opacity="0.9"/>
    <!-- Petites coulées centrales -->
    <path d="M 900 280 L 895 380 L 905 380 Z" fill="#ff6b35"/>
  </g>

  <!-- Sol/horizon -->
  <rect x="0" y="500" width="1280" height="220" fill="url(#groundGrad)"/>

  <!-- Saint-Denis en silhouette (cases créoles avec lampions, côté gauche) -->
  <g fill="url(#houseGrad)" stroke="#000" stroke-width="1.5">
    <!-- Maison 1 -->
    <rect x="80" y="475" width="60" height="55"/>
    <polygon points="80,475 110,445 140,475"/>
    <!-- Maison 2 -->
    <rect x="155" y="465" width="70" height="65"/>
    <polygon points="155,465 190,430 225,465"/>
    <!-- Maison 3 -->
    <rect x="240" y="480" width="55" height="50"/>
    <polygon points="240,480 267,455 295,480"/>
    <!-- Maison 4 -->
    <rect x="310" y="470" width="65" height="60"/>
    <polygon points="310,470 342,440 375,470"/>
    <!-- Maison 5 -->
    <rect x="390" y="478" width="58" height="52"/>
    <polygon points="390,478 419,452 448,478"/>
  </g>

  <!-- Lampions allumés au-dessus des cases -->
  <g filter="url(#softGlow)">
    <circle cx="110" cy="438" r="6" fill="#ffe6a0"/>
    <circle cx="190" cy="423" r="7" fill="#ffe6a0"/>
    <circle cx="267" cy="448" r="6" fill="#ffe6a0"/>
    <circle cx="342" cy="433" r="7" fill="#ffe6a0"/>
    <circle cx="419" cy="445" r="6" fill="#ffe6a0"/>
  </g>
  <!-- Guirlande lampions reliant les maisons -->
  <path d="M 110 438 Q 150 420 190 423 Q 230 430 267 448 Q 305 435 342 433 Q 380 440 419 445"
        stroke="#f4b942" stroke-width="1.5" fill="none" opacity="0.7" stroke-dasharray="4 4"/>

  <!-- Palmier silhouette gauche -->
  <g fill="#0a0402" stroke="#000" stroke-width="1.5">
    <rect x="38" y="380" width="8" height="150"/>
    <path d="M 42 380 Q 10 360 -5 380 Q 15 370 38 385 Z"/>
    <path d="M 42 380 Q 75 360 90 380 Q 70 370 46 385 Z"/>
    <path d="M 42 380 Q 5 345 -10 350 Q 15 350 38 378 Z"/>
    <path d="M 42 380 Q 80 345 95 350 Q 70 350 46 378 Z"/>
  </g>

  <!-- Palmier silhouette droite -->
  <g fill="#0a0402" stroke="#000" stroke-width="1.5">
    <rect x="1232" y="400" width="8" height="130"/>
    <path d="M 1236 400 Q 1268 380 1283 400 Q 1263 390 1240 405 Z"/>
    <path d="M 1236 400 Q 1204 380 1189 400 Q 1209 390 1232 405 Z"/>
    <path d="M 1236 400 Q 1275 365 1290 370 Q 1265 370 1240 398 Z"/>
    <path d="M 1236 400 Q 1198 365 1183 370 Q 1208 370 1232 398 Z"/>
  </g>

  <!-- Zombies cartoon en marche (3 de tailles différentes au premier plan) -->
  <!-- Zombie 1 (avant gauche) -->
  <g filter="url(#dropShadow)">
    <rect x="540" y="555" width="55" height="80" rx="6" fill="url(#zombieGrad)" stroke="#0a3a18" stroke-width="3"/>
    <rect x="513" y="572" width="25" height="16" rx="4" fill="url(#zombieGrad)" stroke="#0a3a18" stroke-width="2.5"/>
    <rect x="597" y="572" width="25" height="16" rx="4" fill="url(#zombieGrad)" stroke="#0a3a18" stroke-width="2.5"/>
    <ellipse cx="567" cy="540" rx="26" ry="24" fill="#3fb55f" stroke="#0a3a18" stroke-width="3"/>
    <circle cx="558" cy="538" r="4" fill="#ff3030"/>
    <circle cx="576" cy="538" r="4" fill="#ff3030"/>
    <path d="M 552 552 L 558 555 L 564 552 L 570 555 L 576 552 L 582 555 L 588 552" stroke="#0a3a18" stroke-width="2" fill="none"/>
    <rect x="547" y="630" width="11" height="22" fill="#1c8b3e" stroke="#0a3a18" stroke-width="2"/>
    <rect x="577" y="630" width="11" height="22" fill="#1c8b3e" stroke="#0a3a18" stroke-width="2"/>
  </g>

  <!-- Zombie 2 (milieu, plus grand) -->
  <g filter="url(#dropShadow)">
    <rect x="640" y="540" width="70" height="100" rx="8" fill="url(#zombieGrad)" stroke="#0a3a18" stroke-width="3"/>
    <rect x="605" y="560" width="32" height="20" rx="5" fill="url(#zombieGrad)" stroke="#0a3a18" stroke-width="2.5"/>
    <rect x="712" y="560" width="32" height="20" rx="5" fill="url(#zombieGrad)" stroke="#0a3a18" stroke-width="2.5"/>
    <ellipse cx="675" cy="520" rx="32" ry="30" fill="#3fb55f" stroke="#0a3a18" stroke-width="3"/>
    <circle cx="664" cy="518" r="5" fill="#ff3030"/>
    <circle cx="686" cy="518" r="5" fill="#ff3030"/>
    <path d="M 658 535 L 664 538 L 670 535 L 676 538 L 682 535 L 688 538 L 694 535" stroke="#0a3a18" stroke-width="2.5" fill="none"/>
    <rect x="650" y="635" width="13" height="26" fill="#1c8b3e" stroke="#0a3a18" stroke-width="2"/>
    <rect x="687" y="635" width="13" height="26" fill="#1c8b3e" stroke="#0a3a18" stroke-width="2"/>
  </g>

  <!-- Zombie 3 (plus petit, en retrait à droite) -->
  <g filter="url(#dropShadow)">
    <rect x="760" y="575" width="45" height="65" rx="5" fill="url(#zombieGrad)" stroke="#0a3a18" stroke-width="2.5"/>
    <rect x="740" y="588" width="22" height="14" rx="3" fill="url(#zombieGrad)" stroke="#0a3a18" stroke-width="2"/>
    <rect x="807" y="588" width="22" height="14" rx="3" fill="url(#zombieGrad)" stroke="#0a3a18" stroke-width="2"/>
    <ellipse cx="782" cy="563" rx="22" ry="20" fill="#3fb55f" stroke="#0a3a18" stroke-width="2.5"/>
    <circle cx="775" cy="561" r="3.5" fill="#ff3030"/>
    <circle cx="789" cy="561" r="3.5" fill="#ff3030"/>
    <path d="M 770 573 L 775 575 L 780 573 L 785 575 L 790 573 L 795 575" stroke="#0a3a18" stroke-width="1.8" fill="none"/>
    <rect x="767" y="635" width="9" height="18" fill="#1c8b3e" stroke="#0a3a18" stroke-width="1.8"/>
    <rect x="788" y="635" width="9" height="18" fill="#1c8b3e" stroke="#0a3a18" stroke-width="1.8"/>
  </g>

  <!-- Joueur héroïque en silhouette tirant un fusil (devant à droite) -->
  <g filter="url(#dropShadow)">
    <!-- Corps (silhouette noire avec contour or) -->
    <rect x="1010" y="500" width="50" height="110" rx="8" fill="#0d0d0d" stroke="#f4b942" stroke-width="2.5"/>
    <!-- Bras tendu en avant tenant le fusil -->
    <rect x="965" y="520" width="50" height="14" rx="4" fill="#0d0d0d" stroke="#f4b942" stroke-width="2"/>
    <!-- Bras arrière -->
    <rect x="1055" y="525" width="20" height="40" rx="4" fill="#0d0d0d" stroke="#f4b942" stroke-width="2"/>
    <!-- Tête (avec casquette/bandana) -->
    <ellipse cx="1035" cy="478" rx="22" ry="22" fill="#0d0d0d" stroke="#f4b942" stroke-width="2.5"/>
    <!-- Bandana orange -->
    <path d="M 1015 470 Q 1035 460 1055 470 L 1055 478 L 1015 478 Z" fill="#ff6b35"/>
    <!-- Œil héroïque -->
    <circle cx="1028" cy="480" r="1.8" fill="#ffe6a0"/>
    <!-- Fusil -->
    <rect x="900" y="522" width="80" height="9" rx="2" fill="#2d2d2d" stroke="#000" stroke-width="1.5"/>
    <rect x="975" y="525" width="14" height="5" fill="#2d2d2d"/>
    <!-- Crosse -->
    <polygon points="985,520 1005,520 1000,535 985,535" fill="#5a3a1a"/>
    <!-- Jambes -->
    <rect x="1015" y="605" width="14" height="32" fill="#0d0d0d" stroke="#f4b942" stroke-width="2"/>
    <rect x="1040" y="605" width="14" height="32" fill="#0d0d0d" stroke="#f4b942" stroke-width="2"/>

    <!-- Flash du fusil -->
    <g filter="url(#softGlow)">
      <polygon points="900,527 870,515 870,540" fill="#ffe6a0"/>
      <polygon points="895,527 875,520 875,535" fill="#ff6b35"/>
      <circle cx="880" cy="527" r="6" fill="#ffe6a0"/>
    </g>
  </g>

  <!-- Hibiscus rose décoratif coin haut-gauche -->
  <g transform="translate(110,540)">
    <g fill="#e91e63" stroke="#7a0d33" stroke-width="2.5">
      <ellipse cx="0" cy="-30" rx="20" ry="28"/>
      <ellipse cx="29" cy="-9" rx="20" ry="28" transform="rotate(72 29 -9)"/>
      <ellipse cx="18" cy="27" rx="20" ry="28" transform="rotate(144 18 27)"/>
      <ellipse cx="-18" cy="27" rx="20" ry="28" transform="rotate(216 -18 27)"/>
      <ellipse cx="-29" cy="-9" rx="20" ry="28" transform="rotate(288 -29 -9)"/>
    </g>
    <circle cx="0" cy="0" r="8" fill="#ffe6a0" stroke="#7a0d33" stroke-width="2"/>
    <circle cx="0" cy="-12" r="3" fill="#f4b942"/>
    <circle cx="9" cy="6" r="2.5" fill="#f4b942"/>
    <circle cx="-9" cy="6" r="2.5" fill="#f4b942"/>
  </g>

  <!-- Hibiscus plus petit coin bas-droit -->
  <g transform="translate(1150,640)">
    <g fill="#e91e63" stroke="#7a0d33" stroke-width="2" opacity="0.95">
      <ellipse cx="0" cy="-20" rx="14" ry="20"/>
      <ellipse cx="20" cy="-6" rx="14" ry="20" transform="rotate(72 20 -6)"/>
      <ellipse cx="13" cy="18" rx="14" ry="20" transform="rotate(144 13 18)"/>
      <ellipse cx="-13" cy="18" rx="14" ry="20" transform="rotate(216 -13 18)"/>
      <ellipse cx="-20" cy="-6" rx="14" ry="20" transform="rotate(288 -20 -6)"/>
    </g>
    <circle cx="0" cy="0" r="5" fill="#ffe6a0"/>
  </g>

  <!-- Bandeau noir semi-transparent derrière le titre (lisibilité) -->
  <rect x="0" y="35" width="1280" height="160" fill="#000" opacity="0.35"/>

  <!-- TITRE -->
  <g filter="url(#bigGlow)">
    <text x="640" y="125" text-anchor="middle"
          font-family="Impact, 'Arial Black', 'Trebuchet MS', sans-serif"
          font-size="98" font-weight="900"
          fill="url(#titleFire)"
          stroke="#7a0d05" stroke-width="3.5"
          letter-spacing="2"
          paint-order="stroke">L'ÉVEIL DE LA FOURNAISE</text>
  </g>

  <!-- Sous-titre italique cannelle -->
  <text x="640" y="172" text-anchor="middle"
        font-family="Georgia, 'Times New Roman', serif"
        font-size="32" font-style="italic"
        fill="#f4b942"
        stroke="#3a2008" stroke-width="0.8"
        paint-order="stroke">Sauve La Réunion vague par vague</text>

  <!-- Bandeau bas semi-transparent pour la mention -->
  <rect x="0" y="680" width="1280" height="40" fill="#000" opacity="0.55"/>

  <!-- Mention -->
  <text x="640" y="707" text-anchor="middle"
        font-family="'Trebuchet MS', 'Segoe UI', sans-serif"
        font-size="22" font-weight="bold"
        fill="#ffe6a0">
    <tspan fill="#ff6b35">🌋</tspan> 24 communes
    <tspan fill="#f4b942"> • </tspan> 7 actes
    <tspan fill="#f4b942"> • </tspan> Coop jusqu'à 6
  </text>

  <!-- Cadre or fin tout autour -->
  <rect x="3" y="3" width="1274" height="714" fill="none"
        stroke="url(#goldGrad)" stroke-width="5"/>
</svg>
