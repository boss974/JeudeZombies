<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512" role="img" aria-label="L'Éveil de la Fournaise - icône">
  <title>L'Éveil de la Fournaise</title>
  <desc>Icône du jeu Roblox : île de La Réunion, volcan en éruption, zombie cartoon, hibiscus, mention ÉVEIL.</desc>

  <defs>
    <!-- Fond radial sable noir -> orange volcanique -->
    <radialGradient id="bgGrad" cx="50%" cy="55%" r="75%">
      <stop offset="0%" stop-color="#ff6b35"/>
      <stop offset="55%" stop-color="#7a2a14"/>
      <stop offset="100%" stop-color="#2d2d2d"/>
    </radialGradient>

    <!-- Dégradé île -->
    <radialGradient id="islandGrad" cx="50%" cy="45%" r="65%">
      <stop offset="0%" stop-color="#1c8b3e"/>
      <stop offset="70%" stop-color="#0e5c28"/>
      <stop offset="100%" stop-color="#2d2d2d"/>
    </radialGradient>

    <!-- Dégradé lave -->
    <linearGradient id="lavaGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fff3a0"/>
      <stop offset="40%" stop-color="#ff6b35"/>
      <stop offset="100%" stop-color="#e94e1b"/>
    </linearGradient>

    <!-- Glow volcan -->
    <radialGradient id="volcanoGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ffe6a0" stop-opacity="0.9"/>
      <stop offset="55%" stop-color="#ff6b35" stop-opacity="0.45"/>
      <stop offset="100%" stop-color="#ff6b35" stop-opacity="0"/>
    </radialGradient>

    <!-- Or bordure -->
    <linearGradient id="goldBorder" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ffe6a0"/>
      <stop offset="50%" stop-color="#f4b942"/>
      <stop offset="100%" stop-color="#a8731a"/>
    </linearGradient>

    <!-- Zombie corps -->
    <linearGradient id="zombieGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#3fb55f"/>
      <stop offset="100%" stop-color="#1c8b3e"/>
    </linearGradient>

    <filter id="softGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <filter id="textGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Fond rond (carte Roblox tolère l'arrondi) -->
  <rect x="0" y="0" width="512" height="512" rx="72" ry="72" fill="url(#bgGrad)"/>

  <!-- Étoiles / cendres en arrière-plan -->
  <g fill="#ffe6a0" opacity="0.55">
    <circle cx="60" cy="80" r="2.4"/>
    <circle cx="120" cy="50" r="1.6"/>
    <circle cx="430" cy="70" r="2"/>
    <circle cx="470" cy="160" r="1.4"/>
    <circle cx="40" cy="220" r="1.7"/>
    <circle cx="490" cy="290" r="1.5"/>
    <circle cx="80" cy="340" r="1.8"/>
  </g>

  <!-- Glow autour du volcan -->
  <circle cx="270" cy="260" r="200" fill="url(#volcanoGlow)"/>

  <!-- Île de La Réunion stylisée (ovale + côtes) -->
  <g>
    <ellipse cx="256" cy="300" rx="180" ry="115" fill="url(#islandGrad)" stroke="#0a3a18" stroke-width="4"/>
    <!-- Petite plage sable noir -->
    <ellipse cx="256" cy="300" rx="180" ry="115" fill="none" stroke="#2d2d2d" stroke-width="6" stroke-dasharray="3 8" opacity="0.55"/>
    <!-- Lagons turquoise (petites touches côtières) -->
    <ellipse cx="120" cy="335" rx="22" ry="8" fill="#0099b8" opacity="0.6"/>
    <ellipse cx="395" cy="335" rx="22" ry="8" fill="#0099b8" opacity="0.6"/>
  </g>

  <!-- Piton de la Fournaise en éruption -->
  <g filter="url(#softGlow)">
    <!-- Cône volcan -->
    <path d="M 200 285 L 256 175 L 312 285 Z" fill="#3a2a22" stroke="#1a0e08" stroke-width="3"/>
    <!-- Cratère -->
    <ellipse cx="256" cy="178" rx="28" ry="8" fill="#1a0e08"/>
    <!-- Coulée de lave côté droit -->
    <path d="M 285 230 Q 305 260 320 290 L 312 285 Q 300 260 278 240 Z" fill="url(#lavaGrad)"/>
    <!-- Coulée de lave côté gauche -->
    <path d="M 227 230 Q 207 260 195 290 L 200 285 Q 215 260 232 240 Z" fill="url(#lavaGrad)" opacity="0.85"/>

    <!-- Jets de lave -->
    <path d="M 256 175 Q 240 130 230 100 Q 245 120 248 145 Z" fill="#ff6b35"/>
    <path d="M 256 175 Q 260 120 268 90 Q 272 115 268 150 Z" fill="#ffe6a0"/>
    <path d="M 256 175 Q 275 135 290 115 Q 282 140 276 160 Z" fill="#e94e1b"/>

    <!-- Particules de lave -->
    <circle cx="240" cy="125" r="5" fill="#ffe6a0"/>
    <circle cx="276" cy="110" r="4" fill="#ff6b35"/>
    <circle cx="220" cy="150" r="3" fill="#ffe6a0"/>
    <circle cx="294" cy="140" r="3.5" fill="#e94e1b"/>
  </g>

  <!-- Petites cases créoles avec lampions (silhouettes) -->
  <g fill="#2d2d2d" opacity="0.85">
    <rect x="155" y="320" width="22" height="20"/>
    <polygon points="155,320 166,308 177,320"/>
    <rect x="335" y="318" width="22" height="22"/>
    <polygon points="335,318 346,305 357,318"/>
  </g>
  <!-- Lampions allumés -->
  <circle cx="166" cy="305" r="3.5" fill="#ffe6a0"/>
  <circle cx="346" cy="302" r="3.5" fill="#ffe6a0"/>

  <!-- Zombie cartoon devant l'île -->
  <g filter="url(#softGlow)">
    <!-- Corps -->
    <rect x="232" y="330" width="48" height="70" rx="6" fill="url(#zombieGrad)" stroke="#0a3a18" stroke-width="3"/>
    <!-- Bras tendus -->
    <rect x="208" y="345" width="22" height="14" rx="4" fill="url(#zombieGrad)" stroke="#0a3a18" stroke-width="2.5"/>
    <rect x="282" y="345" width="22" height="14" rx="4" fill="url(#zombieGrad)" stroke="#0a3a18" stroke-width="2.5"/>
    <!-- Tête -->
    <ellipse cx="256" cy="320" rx="22" ry="20" fill="#3fb55f" stroke="#0a3a18" stroke-width="3"/>
    <!-- Yeux rouges -->
    <circle cx="248" cy="318" r="3.5" fill="#ff3030"/>
    <circle cx="264" cy="318" r="3.5" fill="#ff3030"/>
    <!-- Bouche zigzag -->
    <path d="M 244 330 L 248 332 L 252 330 L 256 332 L 260 330 L 264 332 L 268 330" stroke="#0a3a18" stroke-width="2" fill="none" stroke-linecap="round"/>
    <!-- Jambes -->
    <rect x="238" y="395" width="10" height="20" fill="#1c8b3e" stroke="#0a3a18" stroke-width="2"/>
    <rect x="264" y="395" width="10" height="20" fill="#1c8b3e" stroke="#0a3a18" stroke-width="2"/>
  </g>

  <!-- Hibiscus rose coin haut-droit -->
  <g transform="translate(430,90)">
    <!-- 5 pétales -->
    <g fill="#e91e63" stroke="#7a0d33" stroke-width="2">
      <ellipse cx="0" cy="-22" rx="14" ry="20"/>
      <ellipse cx="21" cy="-7" rx="14" ry="20" transform="rotate(72 21 -7)"/>
      <ellipse cx="13" cy="20" rx="14" ry="20" transform="rotate(144 13 20)"/>
      <ellipse cx="-13" cy="20" rx="14" ry="20" transform="rotate(216 -13 20)"/>
      <ellipse cx="-21" cy="-7" rx="14" ry="20" transform="rotate(288 -21 -7)"/>
    </g>
    <!-- Pistil -->
    <circle cx="0" cy="0" r="5" fill="#ffe6a0" stroke="#7a0d33" stroke-width="1.5"/>
    <circle cx="0" cy="-8" r="2" fill="#f4b942"/>
  </g>

  <!-- Petite feuille palmier coin bas-droit -->
  <g transform="translate(440,420) rotate(-25)" stroke="#0a3a18" stroke-width="2" fill="#1c8b3e">
    <path d="M 0 0 Q -10 -25 -25 -35 Q -8 -28 0 -10 Z"/>
    <path d="M 0 0 Q 15 -22 30 -25 Q 12 -22 5 -8 Z"/>
    <path d="M 0 0 Q 25 -8 38 -3 Q 18 -3 8 0 Z"/>
  </g>

  <!-- Titre ÉVEIL coin bas-gauche -->
  <g filter="url(#textGlow)">
    <text x="42" y="455" font-family="Impact, 'Arial Black', sans-serif"
          font-size="58" font-weight="900"
          fill="#ffe6a0" stroke="#7a3a0a" stroke-width="3"
          letter-spacing="2">ÉVEIL</text>
  </g>

  <!-- Bordure or vieilli -->
  <rect x="6" y="6" width="500" height="500" rx="68" ry="68" fill="none"
        stroke="url(#goldBorder)" stroke-width="8"/>
  <rect x="14" y="14" width="484" height="484" rx="60" ry="60" fill="none"
        stroke="#7a3a0a" stroke-width="2" opacity="0.7"/>
</svg>
